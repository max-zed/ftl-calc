<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<title>FTL Calculator</title> 
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<meta name="mobile-web-app-capable" content="yes">  
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="index.css">
</head>

<body>

<button onclick="update_app()" id="update-btn">Update</button>
<h2>Check In Time</h2><input id="check-in-datetime" type="datetime-local" placeholder="DD.MM.JJJJ HH:MM"><span>UTC</span>

<h2>Number of legs flown</h2><input id="leg-count" type="number"><span>Legs</span>

<button onclick="calculate_final_data()">Calculate</button>

<h3>Latest On-Block:</h3><span id="on-block-time"></span>

<script src="index.js"></script>

</body>
</html>
